# Site configuration
baseURL: "https://king-mmm.github.io/hextra/"
title: "我的个人博客"
theme: hextra

enableRobotsTXT: true
enableGitInfo: true
hasCJKLanguage: true
enableInlineShortcodes: true

outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

defaultContentLanguage: zh-cn
languages:
  zh-cn:
    label: 简体中文
    languageCode: zh-CN
    weight: 1
    title: 我的个人博客

ignoreFiles:
  - '\.fa\.md$'
  - '\.ja\.md$'
  - '\.zh-cn\.md$'
  - 'content/docs/'
  - 'content/glossary/'
  - 'content/showcase/'
  - 'content/blog/v[0-9]'
  - 'content/blog/markdown\.md$'

module:
  hugoVersion:
    extended: true
    min: "0.146.0"

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

menu:
  main:
    - identifier: blog
      name: 博客
      url: /blog/
      weight: 1
    - identifier: projects
      name: 项目
      url: /projects/
      weight: 2
    - identifier: about
      name: 关于
      url: /about/
      weight: 3
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 4
    - name: 搜索
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/"
      params:
        icon: github

params:
  description: 记录技术、项目和生活思考的个人博客。

  externalLinkDecoration: true

  navbar:
    displayTitle: true
    displayLogo: false
    width: wide

  theme:
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: false
    displayPoweredBy: false
    width: normal

  displayUpdatedDate: true
  dateFormat: "2006-01-02"
  displayUpdatedAuthor: false

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  editURL:
    enable: false

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 20
    article:
      displayPagination: true

  archives:
    section: blog
    dateFormat: "01-02"

  toc:
    displayTags: true

  highlight:
    copy:
      enable: true
      display: hover

  page:
    width: normal
    contextMenu:
      enable: false

  imageZoom:
    enable: true

  comments:
    enable: false
